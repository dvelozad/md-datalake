version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mddatalake-postgres
    environment:
      POSTGRES_USER: mdrepo
      POSTGRES_PASSWORD: mdrepo_dev_password
      POSTGRES_DB: mdrepo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdrepo"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mddatalake-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mddatalake-api
    command: uvicorn mddatalake.api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://mdrepo:mdrepo_dev_password@postgres:5432/mdrepo
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: md-simulations
      STORAGE_BACKEND: s3
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mddatalake-frontend
    environment:
      VITE_API_URL: http://api:8000
      VITE_MDSERV_BASE: http://localhost:8090
    ports:
      - "3000:80"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: mddatalake-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  minio_data:
